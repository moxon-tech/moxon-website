<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản trị nội dung - MOXON Tech</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260709-sdk-rewrite-v1">
    <link rel="stylesheet" href="admin.css?v=20260710-admin-refresh-v1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
  </head>
  <body class="admin-page">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-top">
        <a class="admin-brand" href="../index.html">
          <img src="../assets/logo-transparent.png?v=20260709-sdk-rewrite-v1" alt="MOXON">
          <span>MOXON </span>
        </a>
        <div class="admin-mobile-profile" data-admin-profile></div>
        <button class="admin-mobile-menu-toggle" type="button" aria-label="Mở menu quản trị" aria-expanded="false" data-admin-mobile-menu-toggle>
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <nav class="admin-nav" data-admin-nav></nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-heading" data-admin-heading>
          <p class="admin-kicker">Quản trị nội dung</p>
          <h1 data-admin-title>Tổng quan</h1>
        </div>

        <label class="admin-search">
          <span>Tìm kiếm nhanh</span>
          <input type="search" placeholder="Tìm kiếm nhanh..." data-admin-quick-search>
        </label>

        <div class="admin-actions">
          <a class="admin-secondary-btn" href="../index.html" target="_blank" rel="noopener" data-admin-view-site>Xem website</a>
          <div class="admin-topbar-profile" data-admin-profile></div>
        </div>
      </header>

      <section class="admin-summary-grid" data-admin-summary></section>
      <section class="admin-editor-panel" data-admin-editor></section>
    </main>

    <div class="admin-cropper-modal" id="cropper-modal" aria-hidden="true" role="dialog">
      <div class="admin-cropper-content">
        <div class="admin-editor-head" style="margin-bottom: 8px; justify-content: flex-start;">
          <div>
            <p class="admin-kicker">Căn chỉnh hình ảnh</p>
            <h3 style="margin: 0; font-size: 1.15rem;">Cắt ảnh theo tỉ lệ phù hợp</h3>
          </div>
        </div>
        <div class="admin-cropper-body">
          <img id="cropper-image" src="" alt="Cắt ảnh">
        </div>
        <div class="admin-cropper-actions">
          <button class="admin-secondary-btn" type="button" id="cropper-cancel-btn">Hủy bỏ</button>
          <button class="admin-primary-btn" type="button" id="cropper-save-btn">Xác nhận &amp; Cắt</button>
        </div>
      </div>
    </div>

    <div class="admin-cropper-modal" id="admin-general-modal" aria-hidden="true" role="dialog">
      <div class="admin-cropper-content" style="max-width: 460px;">
        <div class="admin-modal-header">
          <h3 id="admin-modal-title" class="admin-modal-title">Tiêu đề</h3>
          <button type="button" id="admin-modal-close-btn" class="admin-modal-close">&times;</button>
        </div>
        <div class="admin-cropper-body" id="admin-modal-body-content" style="max-height: none; padding: 4px 0;">
          <!-- Nội dung tự động -->
        </div>
      </div>
    </div>

    <div class="admin-toast-container" id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../data/site-data.js?v=20260709-sdk-rewrite-v1"></script>
    <script src="../data/supabase-config.js?v=20260709-sdk-rewrite-v1"></script>
    <script src="../data/supabase-client.js?v=20260709-sdk-rewrite-v1"></script>
    <script src="admin.js?v=20260710-admin-clean-v1"></script>
  </body>
</html>
